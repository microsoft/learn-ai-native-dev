<!--
  Practice → problems → intuition flywheel.
  Source: docs/philosophy.md §1 ("the order of those words matters").
  - Three nodes large enough for text to sit inside.
  - A curved track connects them; a glowing pulse travels it (forward only).
  - "vocabulary" floats as a faint, optional orbiting satellite (philosophy §4.6).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360" role="img" aria-label="Practice leads to problems leads to intuition; vocabulary is optional and arrives later">
  <defs>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ff5500" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ff5500" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff5500" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#e2e2e6"/>
      <stop offset="50%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#e2e2e6"/>
    </linearGradient>
    <style><![CDATA[
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .sans { font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif; font-weight: 700; }
      .ink  { fill: #0a0a0a; }
      .dim  { fill: #888; }
      .muted{ fill: #b8b8c0; }
      .acc  { fill: #ff5500; }
      .nodebg { fill: #fff; stroke: #0a0a0a; stroke-width: 2; }
    ]]></style>
  </defs>

  <!-- title row -->
  <text x="450" y="36" text-anchor="middle" class="sans ink" font-size="14" letter-spacing="3">THE ORDER OF THESE WORDS MATTERS</text>
  <text x="450" y="54" text-anchor="middle" class="mono dim" font-size="11">— docs/philosophy.md §1</text>

  <!-- arrow defs -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#0a0a0a"/>
    </marker>
  </defs>

  <!-- flowing curved track passing through the three nodes
       Path geometry: starts at practice (180,200), arcs up-and-down through
       problems (450,200), then to intuition (720,200). Two gentle arcs make
       the line read as motion, not a ruler. -->
  <path id="flow"
        d="M 150 200 Q 315 110, 450 200 Q 585 290, 720 200"
        fill="none"
        stroke="url(#track)"
        stroke-width="3"
        stroke-linecap="round"
        marker-end="url(#arrow)"/>

  <!-- glow that follows the path -->
  <circle r="22" fill="url(#pulse)">
    <animateMotion dur="6s" repeatCount="indefinite" rotate="auto">
      <mpath href="#flow"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- core dot of the pulse -->
  <circle r="5" class="acc">
    <animateMotion dur="6s" repeatCount="indefinite" rotate="auto">
      <mpath href="#flow"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- node 1: practice -->
  <g transform="translate(150,200)">
    <circle r="60" class="nodebg"/>
    <text y="-6" text-anchor="middle" class="sans ink" font-size="18">practice</text>
    <text y="14" text-anchor="middle" class="mono dim" font-size="10">ship small</text>
    <text y="28" text-anchor="middle" class="mono dim" font-size="10">things</text>
  </g>

  <!-- node 2: problems -->
  <g transform="translate(450,200)">
    <circle r="60" class="nodebg"/>
    <text y="-6" text-anchor="middle" class="sans ink" font-size="18">problems</text>
    <text y="14" text-anchor="middle" class="mono dim" font-size="10">you actually</text>
    <text y="28" text-anchor="middle" class="mono dim" font-size="10">care about</text>
  </g>

  <!-- node 3: intuition -->
  <g transform="translate(720,200)">
    <circle r="60" class="nodebg"/>
    <text y="-6" text-anchor="middle" class="sans ink" font-size="18">intuition</text>
    <text y="14" text-anchor="middle" class="mono dim" font-size="10">taste · contrast</text>
    <text y="28" text-anchor="middle" class="mono dim" font-size="10">reps</text>
  </g>

  <!-- vocabulary satellite: orbits intuition, faint, slow.
       Per philosophy §4.6 — pattern names live mid-arc and become invisible
       at the end. We render this as a small dotted orbit that fades in late. -->
  <g transform="translate(720,200)">
    <circle r="86" fill="none" stroke="#d8d8dc" stroke-width="1" stroke-dasharray="2 4" opacity="0.7"/>
    <g>
      <circle r="14" cx="86" cy="0" fill="#fff" stroke="#bbb" stroke-width="1"/>
      <text x="86" y="3" text-anchor="middle" class="mono muted" font-size="8">vocab</text>
      <animateTransform attributeName="transform"
                        type="rotate"
                        from="0 0 0"
                        to="360 0 0"
                        dur="14s"
                        repeatCount="indefinite"/>
    </g>
  </g>

  <!-- vocabulary caption -->
  <text x="720" y="320" text-anchor="middle" class="mono dim" font-size="10">vocabulary · later · optional</text>
</svg>
