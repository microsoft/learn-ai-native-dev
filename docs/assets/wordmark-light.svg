<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" width="880" height="200" role="img" aria-label="AI-Native Development">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#0a0a0a">
        <animate attributeName="stop-color" values="#0a0a0a;#1a1a1a;#0a0a0a" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#ff5500">
        <animate attributeName="stop-color" values="#ff5500;#ff7a1a;#ff5500" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0a0a0a">
        <animate attributeName="stop-color" values="#0a0a0a;#1a1a1a;#0a0a0a" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- wordmark -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="800" text-anchor="middle">
    <text x="440" y="78" font-size="72" letter-spacing="6" fill="#0a0a0a">AI&#8209;NATIVE</text>
    <text x="440" y="118" font-size="22" letter-spacing="14" fill="#555">D E V E L O P M E N T</text>
  </g>

  <!-- gradient density bar: ░ ▓ █ -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" text-anchor="middle">
    <text x="440" y="158" fill="url(#g)" letter-spacing="2">
      ░░░░░░░░░░░░░░░░░░▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓████████████████████
      <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
    </text>
    <text x="160" y="184" fill="#888" font-size="11" letter-spacing="3">VIBE</text>
    <text x="440" y="184" fill="#888" font-size="11" letter-spacing="3">SPEC&#8209;DRIVEN</text>
    <text x="720" y="184" fill="#888" font-size="11" letter-spacing="3">AGENTIC</text>
  </g>
</svg>
