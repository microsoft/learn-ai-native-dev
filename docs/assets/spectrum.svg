<!--
  Vibe-coding → spec-driven → agentic engineering: a spectrum, not a ladder.
  Static blocks come from the existing README art; here we add a slow-traveling
  marker to show this is a continuum learners move along, not a fixed identity.
  Aligned with docs/philosophy.md §3.4 ("show contrast where it teaches").
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200" role="img" aria-label="The vibe-coding to agentic-engineering spectrum">
  <defs>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#e8e8ec"/>
      <stop offset="50%"  stop-color="#ff5500"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <style><![CDATA[
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .sans { font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif; font-weight: 700; }
      .ink  { fill: #0a0a0a; }
      .dim  { fill: #888; }
    ]]></style>
  </defs>

  <!-- column headings -->
  <g class="sans ink" font-size="14" text-anchor="middle">
    <text x="150" y="36">VIBE CODING</text>
    <text x="450" y="36">SPEC-DRIVEN DEV</text>
    <text x="750" y="36">AGENTIC ENGINEERING</text>
  </g>
  <g class="mono dim" font-size="11" text-anchor="middle">
    <text x="150" y="56">prompt &amp; pray</text>
    <text x="450" y="56">specs · instructions · context</text>
    <text x="750" y="56">orchestrate · review · ship</text>
  </g>

  <!-- spectrum bar -->
  <rect x="60" y="92" width="780" height="18" rx="9" fill="url(#spectrum)"/>

  <!-- traveling marker = the learner moving across the spectrum.
       Always forward: glide left→right, dwell at agentic, fade out, reappear at start.
       Never moves backward (that would imply unlearning). -->
  <g>
    <circle r="11" cx="60" cy="101" fill="#fff" stroke="#0a0a0a" stroke-width="2">
      <animate attributeName="cx"
               values="60;840;840;60"
               keyTimes="0;0.7;0.95;1"
               dur="8s"
               repeatCount="indefinite"/>
      <animate attributeName="opacity"
               values="1;1;1;0;0;1"
               keyTimes="0;0.7;0.9;0.95;0.99;1"
               dur="8s"
               repeatCount="indefinite"/>
    </circle>
    <circle r="4" cx="60" cy="101" fill="#ff5500">
      <animate attributeName="cx"
               values="60;840;840;60"
               keyTimes="0;0.7;0.95;1"
               dur="8s"
               repeatCount="indefinite"/>
      <animate attributeName="opacity"
               values="1;1;1;0;0;1"
               keyTimes="0;0.7;0.9;0.95;0.99;1"
               dur="8s"
               repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- axis labels -->
  <g class="mono dim" font-size="10">
    <text x="60"  y="138">antipattern</text>
    <text x="450" y="138" text-anchor="middle">the on-ramp</text>
    <text x="840" y="138" text-anchor="end">pattern</text>
  </g>

  <!-- footer note -->
  <text x="450" y="178" text-anchor="middle" class="mono dim" font-size="11">
    a spectrum learners move along — not a destination they arrive at
  </text>
</svg>
