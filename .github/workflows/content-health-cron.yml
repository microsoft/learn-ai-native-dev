# Weekly content health refresh
#
# Runs @content-health every Monday morning. For any clearly stale items
# (out-of-date versions, broken links), it opens a single auto-PR labeled
# `agent-refresh` for maintainers to review.
#
# Manual runs: workflow_dispatch.

name: Content health refresh

on:
  schedule:
    # 09:00 UTC every Monday.
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install website deps
        run: npm ci

      - name: Install agent runner
        run: npm install --no-save @github/copilot-sdk@^0.3.0

      - name: Run @content-health
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: node .github/workflows/scripts/run-content-health.mjs

      - name: Open PR with refreshes
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only open a PR if the agent actually edited something.
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="agent-refresh/$(date +%Y-%m-%d)"
            git config user.name "agent-refresh-bot"
            git config user.email "agent-refresh@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "chore(refresh): weekly content health pass"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore(refresh): weekly content health" \
              --body "Auto-generated by @content-health. Review the diff before merging." \
              --label "agent-refresh" \
              --base main \
              --head "$BRANCH"
          else
            echo "Nothing to refresh this week."
          fi
