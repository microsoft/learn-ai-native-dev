# Instructions linter (Tier 3 / item #11)
#
# Monthly job. For each *.instructions.md, sample the last N PRs that
# touched files matching its `applyTo` glob and grade whether the diffs
# respected the rules. Surfaces stale / ignored instructions for retirement.

name: Instructions linter

on:
  schedule:
    # 09:00 UTC on the 15th of every month.
    - cron: '0 9 15 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - name: Install agent runner
        run: npm install --no-save @github/copilot-sdk@^0.3.0

      - name: Lint instructions
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/workflows/scripts/run-instructions-linter.mjs > instructions-report.md

      - name: Open / update tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('instructions-report.md', 'utf-8').trim();
            if (!body || body.startsWith('✅')) return;
            const title = `🔍 Instructions effectiveness — ${new Date().toISOString().slice(0,10)}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'agent-instructions-lint',
              state: 'open',
            });
            const fullBody = `${body}\n\n_Auto-generated by \`instructions-linter.yml\`._`;
            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                title,
                body: fullBody,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: fullBody,
                labels: ['agent-instructions-lint', 'maintenance'],
              });
            }
