# Curriculum gap finder (Tier 3 / item #10)
#
# Quarterly job. Asks @researcher to scan release notes / changelogs for
# the tools we teach (Copilot, Claude Code, MCP, Agent Skills) and compare
# against our current content. Opens an issue per gap with a draft outline.

name: Curriculum gap finder

on:
  schedule:
    # 09:00 UTC on the 1st of Jan / Apr / Jul / Oct (quarterly).
    - cron: '0 9 1 1,4,7,10 *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - name: Install agent runner
        run: npm install --no-save @github/copilot-sdk@^0.3.0

      - name: Scan
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: node .github/workflows/scripts/run-curriculum-gap.mjs > gap-report.json

      - name: File one issue per gap
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('gap-report.json', 'utf-8').trim();
            // The agent emits a JSON array on the last line; ignore prose.
            const lastLine = raw.split('\n').reverse().find(l => l.trim().startsWith('['));
            if (!lastLine) {
              console.log('Agent did not emit a gap array. Skipping.');
              return;
            }
            const gaps = JSON.parse(lastLine);
            for (const g of gaps) {
              const title = `📚 Curriculum gap: ${g.topic}`;
              const body = [
                `**Tool / area:** ${g.tool}`,
                `**Source:** ${g.source}`,
                '',
                '**Why this matters:**',
                g.rationale,
                '',
                '**Suggested outline:**',
                g.outline.map((b, i) => `${i + 1}. ${b}`).join('\n'),
                '',
                '_Auto-filed by `curriculum-gap-finder.yml`. Triage with `/propose-topic`._',
              ].join('\n');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['agent-curriculum-gap', 'enhancement'],
              });
            }
