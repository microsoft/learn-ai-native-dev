# Translation pipeline (Tier 3 / item #9)
#
# On-demand translation of one track into a target locale. Runs @author
# (translator mode), then @reviewer to confirm step IDs, prompt blocks,
# and frontmatter survived the translation.
#
# Manual trigger only — translation is not free, and we want a maintainer
# to commit to a locale before kicking it off.

name: Translation pipeline

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Track to translate (foundation | agentic | terminal)'
        required: true
        type: choice
        options: [foundation, agentic, terminal]
      locale:
        description: 'Target locale (e.g. es, fr, de, ja)'
        required: true
        type: string
      dry_run:
        description: 'Translate one module only (smoke test)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - name: Install website deps
        run: npm ci

      - name: Install agent runner
        run: npm install --no-save @github/copilot-sdk@^0.3.0

      - name: Translate
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          INPUT_TRACK: ${{ inputs.track }}
          INPUT_LOCALE: ${{ inputs.locale }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: node .github/workflows/scripts/run-translation.mjs

      - name: Validate translation
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          INPUT_TRACK: ${{ inputs.track }}
          INPUT_LOCALE: ${{ inputs.locale }}
        run: node .github/workflows/scripts/run-translation-validate.mjs

      - name: Open PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="i18n/${{ inputs.track }}-${{ inputs.locale }}"
            git config user.name "translation-bot"
            git config user.email "translation-bot@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "i18n(${{ inputs.track }}): translate to ${{ inputs.locale }}"
            git push -f origin "$BRANCH"
            gh pr create \
              --title "i18n(${{ inputs.track }}): ${{ inputs.locale }} translation" \
              --body "Auto-generated by translation pipeline. @reviewer validated frontmatter, step IDs, and prompt blocks survived translation. **Pedagogy review by a native speaker is still required before merge.**" \
              --label "i18n,agent-translation,community" \
              --base main \
              --head "$BRANCH" || echo "PR already exists; pushed update."
          fi
