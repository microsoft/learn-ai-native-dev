# Diagram drift check (Tier 3 / item #8)
#
# Diagrams under src/components/diagrams/ are React components that
# illustrate the markdown they're embedded in. They drift when content
# changes but the diagram is forgotten.
#
# Monthly job: feed each diagram + its referencing markdown to the agent
# and ask whether they still agree. Output is a single ISSUE (not a PR) —
# diagram fixes need a human eye.

name: Diagram drift check

on:
  schedule:
    # 09:00 UTC on the 1st of every month.
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - name: Install agent runner
        run: npm install --no-save @github/copilot-sdk@^0.3.0

      - name: Run drift check
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: node .github/workflows/scripts/run-diagram-drift.mjs > drift-report.md

      - name: Open / update tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('drift-report.md', 'utf-8').trim();
            if (!body || body.startsWith('✅')) {
              console.log('No drift detected.');
              return;
            }
            const title = `🖼️ Diagram drift report — ${new Date().toISOString().slice(0,10)}`;
            // Reuse the most recent open report rather than spamming new issues.
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'agent-diagram-drift',
              state: 'open',
            });
            const fullBody = `${body}\n\n_Auto-generated by \`diagram-drift-check.yml\`._`;
            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                title,
                body: fullBody,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: fullBody,
                labels: ['agent-diagram-drift', 'maintenance'],
              });
            }
